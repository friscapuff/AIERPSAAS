version: '3.9'
services:
  postgres:
    restart: always
    environment:
      POSTGRES_INITDB_ARGS: "-c search_path=aierp,public -c log_statement=all"
    command:
      - "postgres"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_duration=on"
  api:
    restart: always
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
      - "9229:9229"
    command: npm run start:dev
